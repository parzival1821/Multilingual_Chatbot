<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sahayak | Welfare Scheme Assistant</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Project overview">
        <div>
          <p class="eyebrow">NSS AI Project</p>
          <h1>Sahayak</h1>
          <p class="subtitle">A bilingual welfare scheme discovery assistant with grounded answers and source-backed recommendations.</p>
        </div>
        <div class="language-toggle" aria-label="Language selector">
          <button class="segmented active" data-language="en" type="button">English</button>
          <button class="segmented" data-language="hi" type="button">Hindi</button>
        </div>
      </section>

      <section class="layout">
        <form class="panel questionnaire" id="profileForm">
          <div class="section-heading">
            <p class="eyebrow">Step 1</p>
            <h2 data-i18n="profileTitle">Eligibility Profile</h2>
          </div>

          <div class="sample-row" aria-label="Sample personas">
            <button type="button" class="sample" data-persona="farmer">Farmer</button>
            <button type="button" class="sample" data-persona="woman">Woman HoH</button>
            <button type="button" class="sample" data-persona="vendor">Street Vendor</button>
          </div>

          <label>
            <span data-i18n="area">Area</span>
            <select name="area">
              <option value="rural" data-i18n-option="areaRural">Rural</option>
              <option value="urban" data-i18n-option="areaUrban">Urban</option>
            </select>
          </label>

          <label>
            <span data-i18n="occupation">Occupation</span>
            <select name="occupation">
              <option value="farmer" data-i18n-option="farmer">Farmer</option>
              <option value="street_vendor" data-i18n-option="streetVendor">Street vendor</option>
              <option value="informal_worker" data-i18n-option="informalWorker">Informal worker</option>
              <option value="construction_worker" data-i18n-option="constructionWorker">Construction worker</option>
              <option value="domestic_worker" data-i18n-option="domesticWorker">Domestic worker</option>
              <option value="student" data-i18n-option="student">Student</option>
              <option value="other" data-i18n-option="other">Other</option>
            </select>
          </label>

          <div class="grid-2">
            <label>
              <span data-i18n="gender">Gender</span>
              <select name="gender">
                <option value="female" data-i18n-option="female">Female</option>
                <option value="male" data-i18n-option="male">Male</option>
                <option value="other" data-i18n-option="otherGender">Other</option>
              </select>
            </label>

            <label>
              <span data-i18n="age">Age Group</span>
              <select name="ageGroup">
                <option value="18_40" data-i18n-option="age18_40">18-40</option>
                <option value="40_59" data-i18n-option="age40_59">40-59</option>
                <option value="60_79" data-i18n-option="age60_79">60-79</option>
                <option value="80_plus" data-i18n-option="age80Plus">80+</option>
              </select>
            </label>
          </div>

          <label>
            <span data-i18n="income">Income Category</span>
            <select name="incomeGroup">
              <option value="bpl" data-i18n-option="incomeBpl">BPL / very low income</option>
              <option value="ews" data-i18n-option="incomeEws">EWS</option>
              <option value="lig" data-i18n-option="incomeLig">LIG</option>
              <option value="mig" data-i18n-option="incomeMig">MIG</option>
              <option value="other" data-i18n-option="incomeOther">Other / unknown</option>
            </select>
          </label>

          <div class="grid-2">
            <label>
              <span data-i18n="ownsLand">Cultivable land?</span>
              <select name="ownsLand">
                <option value="yes" data-i18n-option="yes">Yes</option>
                <option value="no" data-i18n-option="no">No</option>
              </select>
            </label>

            <label>
              <span data-i18n="pucca">Pucca house?</span>
              <select name="hasPuccaHouse">
                <option value="no" data-i18n-option="no">No</option>
                <option value="yes" data-i18n-option="yes">Yes</option>
              </select>
            </label>
          </div>

          <div class="grid-2">
            <label>
              <span data-i18n="lpg">LPG connection?</span>
              <select name="hasLpg">
                <option value="no" data-i18n-option="no">No</option>
                <option value="yes" data-i18n-option="yes">Yes</option>
              </select>
            </label>

            <label>
              <span data-i18n="bank">Bank account?</span>
              <select name="hasBank">
                <option value="yes" data-i18n-option="yes">Yes</option>
                <option value="no" data-i18n-option="no">No</option>
              </select>
            </label>
          </div>

          <fieldset>
            <legend data-i18n="special">Special category</legend>
            <label class="checkbox"><input type="checkbox" name="specialCategories" value="widowed" /> <span data-i18n="widow">Widow</span></label>
            <label class="checkbox"><input type="checkbox" name="specialCategories" value="disabled" /> <span data-i18n="disabled">Person with disability</span></label>
            <label class="checkbox"><input type="checkbox" name="specialCategories" value="girl_child_parent" /> <span data-i18n="girlChildParent">Parent/guardian of girl child</span></label>
          </fieldset>

          <button class="primary" type="submit" data-i18n="findSchemes">Find Schemes</button>
        </form>

        <section class="panel results-panel" aria-live="polite">
          <div class="section-heading">
            <p class="eyebrow">Step 2</p>
            <h2 data-i18n="recommendations">Recommendations</h2>
          </div>
          <div id="recommendations" class="recommendations"></div>
        </section>
      </section>

      <section class="layout bottom-layout">
        <section class="panel chat-panel">
          <div class="section-heading">
            <p class="eyebrow">Step 3</p>
            <h2 data-i18n="askTitle">Ask a Follow-Up</h2>
          </div>
          <div class="prompt-row">
            <button type="button" class="prompt">What documents do I need for Ayushman Bharat?</button>
            <button type="button" class="prompt">Am I eligible for PM-KISAN?</button>
            <button type="button" class="prompt">Mujhe ghar ke liye kaunsi yojana mil sakti hai?</button>
          </div>
          <form id="chatForm" class="chat-form">
            <input id="chatInput" type="text" data-i18n-placeholder="askPlaceholder" placeholder="Ask about eligibility, benefits, or documents" />
            <button class="primary" type="submit" data-i18n="ask">Ask</button>
          </form>
          <div id="chatAnswer" class="answer-box"></div>
        </section>

        <section class="panel checklist-panel">
          <div class="section-heading">
            <p class="eyebrow">Step 4</p>
            <h2 data-i18n="checklistTitle">Document Checklist</h2>
          </div>
          <label>
            <span data-i18n="chooseScheme">Choose scheme</span>
            <select id="checklistSelect"></select>
          </label>
          <ul id="checklist" class="checklist"></ul>
          <button id="copyChecklist" class="secondary" type="button" data-i18n="copyChecklist">Copy checklist</button>
          <p id="copyStatus" class="copy-status" role="status"></p>
        </section>
      </section>
    </main>

    <script src="src/data.js"></script>
    <script src="src/core.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
